<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Times of Madeira</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <main class="single-post">
        <h1 id="post-title">Loading...</h1>
        <div class="post-content" id="post-body">Loading...</div>
    </main>

    <script>
        const SUPABASE_URL = "https://rbfhbcsgjsypuzzgcbpo.supabase.co";
        const SUPABASE_KEY = "sb_publishable_rV4oivvNDiHh_O_2TLKAQQ_I29j5muX"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchArticle() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('post');
            if (!slug) return;

            const { data, error } = await supabaseClient.from('posts').select('*').eq('slug', slug).single();
            if (error || !data) return;

            document.title = data.title;
            document.getElementById('post-title').innerText = data.title;
            document.getElementById('post-body').innerHTML = data.content_html;
        }
        fetchArticle();
    </script>
</body>
</html>
